apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-war-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-war-app
  template:
    metadata:
      labels:
        app: java-war-app
    spec:
      containers:
      - name: java-war-container
        image: milind1122/java_applicationdevopsproject:latest
        ports:
        - containerPort: 8080
