apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-war-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: java-war-app
  template:
    metadata:
      labels:
        app: java-war-app
    spec:
      containers:
        - name: java-war-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 8080
